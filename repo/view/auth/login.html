<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Precision Portal</title>
    <link rel="stylesheet" href="/static/layui/css/layui.css">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
<div class="pp-login-wrapper">
    <div class="pp-login-box">
        <h2>Precision Portal</h2>
        <form class="layui-form" id="loginForm">
            <div class="layui-form-item">
                <label class="layui-form-label">Username</label>
                <div class="layui-input-block">
                    <input type="text" name="username" required lay-verify="required"
                           placeholder="Enter username" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">Password</label>
                <div class="layui-input-block">
                    <input type="password" name="password" required lay-verify="required"
                           placeholder="Enter password" autocomplete="off" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <div class="layui-input-block">
                    <button class="layui-btn layui-btn-fluid" lay-submit lay-filter="login">
                        Sign In
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<script src="/static/layui/layui.js"></script>
<script>
layui.use(['form', 'layer'], function () {
    var form = layui.form;
    var layer = layui.layer;
    var $ = layui.$;

    form.on('submit(login)', function (data) {
        // Collect device fingerprint
        var fingerprint = {
            userAgent: navigator.userAgent,
            screenResolution: screen.width + 'x' + screen.height,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            platform: navigator.platform
        };

        var payload = {
            username: data.field.username,
            password: data.field.password,
            fingerprint: fingerprint
        };

        $.ajax({
            url: '/api/auth/login',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(payload),
            success: function (res) {
                if (res.code === 200) {
                    layer.msg('Login successful', { icon: 1, time: 1000 }, function () {
                        window.location.href = '/dashboard';
                    });
                } else {
                    layer.msg(res.message || 'Login failed', { icon: 2 });
                }
            },
            error: function (xhr) {
                var msg = 'Login failed';
                try {
                    var resp = JSON.parse(xhr.responseText);
                    msg = resp.message || msg;
                } catch (e) {}
                layer.msg(msg, { icon: 2 });
            }
        });
        return false;
    });
});
</script>
</body>
</html>
